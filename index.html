<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ARCore Scanner & Ruler</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; background: #000; }
        
        /* Main UI Container */
        #ui { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            padding-bottom: env(safe-area-inset-bottom, 30px); /* Adjusts for mobile notches/home bars */
            z-index: 100; 
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none; /* Let clicks pass through to AR session unless hitting a button */
        }

        /* Status Box - Now flexible and won't overlap */
        #status { 
            color: white; 
            background: rgba(0,0,0,0.8); 
            padding: 12px 20px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            font-size: 15px; 
            border: 1px solid #444; 
            width: 85%;
            max-width: 400px;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Button Container */
        .btn-group { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            width: 100%;
            padding-bottom: 20px;
            pointer-events: auto;
        }

        /* Targeting the Three.js generated button specifically */
        #ar-button-container button {
            background: #22c55e !important;
            color: black !important;
            border-radius: 50px !important;
            font-weight: bold !important;
            padding: 15px 25px !important;
            font-size: 14px !important;
            border: none !important;
        }

        button#reset-btn { 
            background: #ef4444; 
            color: white; 
            border: none; 
            padding: 15px 25px; 
            border-radius: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 14px; 
            display: none; /* Hidden until first point is placed */
        }
        
        b { color: #22c55e; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="status">Initializing AR...</div>
        <div class="btn-group">
            <div id="ar-button-container"></div>
            <button id="reset-btn">Reset Scan</button>
        </div>
    </div>

<script type="module">
    import { ARButton } from 'https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js';

    let container, camera, scene, renderer;
    let reticle, controller;
    let hitTestSource = null;
    let hitTestSourceRequested = false;
    
    let scannedPoints = [];
    let activeMarkers = []; 
    let totalDistanceMeters = 0;

    init();
    animate();

    function init() {
        container = document.createElement('div');
        document.body.appendChild(container);

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

        const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
        scene.add(light);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        container.appendChild(renderer.domElement);

        const button = ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] });
        document.getElementById('ar-button-container').appendChild(button);

        document.getElementById('reset-btn').addEventListener('click', resetScanner);

        reticle = new THREE.Mesh(
            new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2),
            new THREE.MeshBasicMaterial({ color: 0x22c55e })
        );
        reticle.matrixAutoUpdate = false;
        reticle.visible = false;
        scene.add(reticle);

        controller = renderer.xr.getController(0);
        controller.addEventListener('select', onSelect);
        scene.add(controller);

        window.addEventListener('resize', onWindowResize);
    }

    function onSelect() {
        if (reticle.visible) {
            document.getElementById('reset-btn').style.display = 'block';

            const position = new THREE.Vector3();
            reticle.matrix.decompose(position, new THREE.Quaternion(), new THREE.Vector3());
            
            const marker = new THREE.Mesh(
                new THREE.SphereGeometry(0.02),
                new THREE.MeshPhongMaterial({ color: 0x3b82f6 })
            );
            marker.position.copy(position);
            scene.add(marker);
            activeMarkers.push(marker);

            scannedPoints.push(position.clone());

            if (scannedPoints.length >= 2) {
                const p1 = scannedPoints[scannedPoints.length - 2];
                const p2 = scannedPoints[scannedPoints.length - 1];
                
                const segmentDistance = p1.distanceTo(p2);
                totalDistanceMeters += segmentDistance;

                // DISPLAY IN METERS (m)
                const lastM = segmentDistance.toFixed(3);
                const totalM = totalDistanceMeters.toFixed(3);
                
                document.getElementById('status').innerHTML = 
                    `Last Segment: <b>${lastM} m</b><br>Total Distance: <b>${totalM} m</b>`;

                const lineGeometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);
                const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
                const line = new THREE.Line(lineGeometry, lineMaterial);
                scene.add(line);
                activeMarkers.push(line);
            } else {
                document.getElementById('status').innerText = "First point set. Find next point!";
            }
        }
    }

    function resetScanner() {
        activeMarkers.forEach(obj => scene.remove(obj));
        activeMarkers = [];
        scannedPoints = [];
        totalDistanceMeters = 0;
        document.getElementById('status').innerText = "Scanner Reset. Tap to start again.";
        document.getElementById('reset-btn').style.display = 'none';
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        renderer.setAnimationLoop(render);
    }

    function render(timestamp, frame) {
        if (frame) {
            const referenceSpace = renderer.xr.getReferenceSpace();
            const session = renderer.xr.getSession();

            if (hitTestSourceRequested === false) {
                session.requestReferenceSpace('viewer').then((refSpace) => {
                    session.requestHitTestSource({ space: refSpace }).then((source) => {
                        hitTestSource = source;
                    });
                });
                hitTestSourceRequested = true;
            }

            if (hitTestSource) {
                const hitTestResults = frame.getHitTestResults(hitTestSource);
                if (hitTestResults.length) {
                    const hit = hitTestResults[0];
                    reticle.visible = true;
                    reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    
                    if(scannedPoints.length === 0) {
                        document.getElementById('status').innerText = "Surface Detected. Tap to start.";
                    }
                } else {
                    reticle.visible = false;
                }
            }
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
